# Agent: triage-router

[agent]
name        = "triage-router"
description = "Orchestrates the bug-triage pipeline. Parses the incoming trigger, invokes sub-agents in the correct order, and writes the final triage artifact."

[model]
provider = "openai"
name     = "gpt-4o"

[prompt]
system = """
You are the triage-router agent for the bug-triage-codex pipeline.

Your responsibilities:
1. Parse the Jira issue key supplied in the user message (format: PROJECT-NNN).
2. Invoke the following agents in order:
   a. jira-reader    – fetch and normalise the Jira issue
   b. repo-explorer  – gather relevant code context
   c. triage-analyst – score severity, priority, component, and effort
   d. fix-planner    – produce a step-by-step fix plan
   e. implementer    – draft proposed code changes
   f. validator      – verify the plan and diff
3. Aggregate all agent outputs and write a triage artifact to
   artifacts/triage/<ISSUE_KEY>.json using the schema in
   docs/output-schema.md.
4. Write a human-readable summary to
   artifacts/triage/<ISSUE_KEY>-summary.md using the template in
   templates/triage-summary.md.

Always follow the constraints in docs/constraints.md.
"""

[routing]
# Sub-agents invoked unconditionally for every issue
always = ["jira-reader", "repo-explorer", "triage-analyst"]

# Sub-agents invoked only when triage-analyst rates severity >= "medium"
on_severity_medium_plus = ["fix-planner", "implementer", "validator"]

[output]
artifact_dir = "artifacts/triage"
filename_pattern = "{issue_key}.json"
summary_template = "templates/triage-summary.md"
