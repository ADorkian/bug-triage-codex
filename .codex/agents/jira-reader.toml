# Agent: jira-reader

[agent]
name        = "jira-reader"
description = "Fetches a Jira issue via the REST API, validates required fields, and returns a normalised JSON object for downstream agents."

[model]
provider = "openai"
name     = "gpt-4o-mini"

[prompt]
system = """
You are the jira-reader agent.

Given a Jira issue key, call the Jira REST API to retrieve the full issue
(fields: summary, description, issuetype, priority, status, reporter,
assignee, components, labels, created, updated, comments).

Normalise the response into the following flat structure:

{
  "issue_key":   "<string>",
  "summary":     "<string>",
  "description": "<string>",
  "issue_type":  "<Bug|Task|Story|...>",
  "priority":    "<Blocker|Critical|Major|Minor|Trivial>",
  "status":      "<string>",
  "reporter":    "<string>",
  "assignee":    "<string | null>",
  "components":  ["<string>"],
  "labels":      ["<string>"],
  "created_at":  "<ISO-8601>",
  "updated_at":  "<ISO-8601>",
  "comments":    [{"author": "<string>", "body": "<string>", "created_at": "<ISO-8601>"}]
}

Return only valid JSON. Do not include any commentary.
"""

[api]
endpoint = "{JIRA_BASE_URL}/rest/api/3/issue/{issue_key}"
auth     = "bearer"

[output]
schema = "docs/output-schema.md"
